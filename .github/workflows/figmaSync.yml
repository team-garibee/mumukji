name: "🎨 Figma Sync"

on:
  pull_request:
    branches:
      - dev
    paths:
      - "**.json"

jobs:
  format-and-commit:
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.head_ref, 'figma-sync/') }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v5
        with:
          version: 10.26.1
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🎨 Format
        run: pnpm format

      - name: Commit formatted files
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "🎨 Style: 프리티어 포맷팅 적용"
          file_pattern: "**/*.json"